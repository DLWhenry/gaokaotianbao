const RANK_TABLE = [

// 分段线性插值：根据位次反查2025年对应分数
function rankToScore2025(rank) {
  // 边界
  if (rank <= RANK_TABLE[0][1]) return RANK_TABLE[0][0].toString();
  if (rank >= RANK_TABLE[RANK_TABLE.length - 1][1]) return '360以下';

  // 找到包围目标位次的两个数据点
  let lo = 0, hi = RANK_TABLE.length - 1;
  for (let i = 0; i < RANK_TABLE.length - 1; i++) {
    // rank 在 [table[i][1], table[i+1][1]] 之间吗？
    let r1 = RANK_TABLE[i][1];
    let r2 = RANK_TABLE[i + 1][1];
    // 确保 r1 <= r2 (位次递增)
    if (r1 <= rank && rank <= r2) {
      lo = i; hi = i + 1; break;
    }
  }

  let [s1, r1] = RANK_TABLE[lo];
  let [s2, r2] = RANK_TABLE[hi];
  if (r1 === r2) return s1.toString();

  // 线性插值: rank 在 r1→r2 之间，对应分数在 s1→s2 之间
  let frac = (rank - r1) / (r2 - r1);
  let score = s1 - frac * (s1 - s2);  // s1 > s2, 分数递减
  return Math.round(score).toString();
}

function getScoreRangeByRank(rank) {
  let margin = Math.round(rank * 0.03);
  let lowRank = Math.max(1, rank - margin);
  let highRank = rank + margin;
  let lowScore = rankToScore2025(lowRank);
  let highScore = rankToScore2025(highRank);
  return { lowScore, highScore, lowRank, highRank };
}

// ==================== 专业关键词匹配 ====================
function matchMajor(majorField, targetMajor) {
  if (!targetMajor) return true;
  const f = majorField.toLowerCase();
  const t = targetMajor.toLowerCase();
  const keywords = t.split(/\s+/);
  return keywords.some(kw => f.includes(kw));
}

function matchMajorSoft(majorField, targetMajor) {
  if (!targetMajor) return true;
  const f = majorField.toLowerCase();
  const t = targetMajor.toLowerCase();
  if (f.includes(t)) return 3; // 精确匹配
  // 相关大类匹配
  const groups = {
    '计算机科学与技术': ['计算机', '软件', '数据科学', '人工智能', '数字媒体', '物联网', '信息'],
    '软件工程': ['软件', '计算机', '数据科学', '人工智能', '数字媒体', '信息'],
    '数据科学与大数据技术': ['数据', '计算机', '软件', '人工智能', '信息'],
    '人工智能': ['人工智能', '智能', '计算机', '数据', '软件'],
    '制药工程': ['制药', '药学', '化学', '化工'],
    '食品科学与工程': ['食品', '生物', '质量'],
    '化学工程与工艺': ['化学', '化工', '制药', '材料'],
    '生物技术': ['生物', '食品'],
    '会计学': ['会计', '财务', '经济'],
    '小学教育(师范)': ['小教', '学前', '教育', '小学'],
  };
  const related = groups[t] || groups[Object.keys(groups).find(k => f.includes(k))] || [];
  if (related.some(r => f.includes(r))) return 2;
  return 0;
}

// ==================== 分析核心 ====================
function analyze() {
  const score = parseInt(document.getElementById('score').value) || 410;
  const rank = parseInt(document.getElementById('rank').value) || 65717;
  const major = document.getElementById('major').value;

  // 1. 2025等效位次范围
  const range = getScoreRangeByRank(rank);
  const equivalentScore = rankToScore2025(rank);

  // 2. 筛选 & 分类
  // gap = 学校最低位次 - 你的位次
  //   gap > 0: 你比学校要求的位次更好(数字更小) → 保
  //   gap < 0: 你比学校要求的位次差(数字更大) → 冲/稳
  //   gap绝对值大: 差距大
  const results = UNIVERSITIES
    .filter(u => u.type !== '民办') // 过滤民办高校
    .map(u => {
    const gap = u.rank2025 - rank;
    let matchScore = matchMajorSoft(u.majors, major);
    if (!major) matchScore = 1; // 不限专业
    
    let tier, sortOrder;
    // 你的位次比学校最低位次差太多(你排在学校后面太远)→ 过滤
    if (gap < -5000 || matchScore === 0) {
      return null;
    } else if (gap < -2000) {
      tier = '冲';   // 你可能够不着，需要冲刺
      sortOrder = 0;
    } else if (gap < 0) {
      tier = '稳';   // 你在学校线边缘，比较稳
      sortOrder = 1;
    } else {
      tier = '保';   // 你的位次比学校最低要求还好
      sortOrder = 2;
    }
    return { ...u, gap, tier, matchScore, sortOrder };
  }).filter(r => r !== null);

  // 优先显示：相关专业、本省、冲在前
  results.sort((a, b) => {
    if (a.matchScore !== b.matchScore) return b.matchScore - a.matchScore;
    if (a.sortOrder !== b.sortOrder) return a.sortOrder - b.sortOrder;
    const isHeilongjiang = (s) => ['哈尔滨','齐齐哈尔','牡丹江','大庆','佳木斯'].includes(s);
    if (isHeilongjiang(a.city) !== isHeilongjiang(b.city)) return isHeilongjiang(b.city) ? 1 : -1;
    return Math.abs(a.gap) - Math.abs(b.gap);
  });

  const domestic = results.filter(r => ['哈尔滨','齐齐哈尔','牡丹江','大庆','佳木斯'].includes(r.city));
  const jilinLiaoning = results.filter(r => ['吉林白城','吉林吉林','辽宁丹东','辽宁锦州'].includes(r.city));
  const national = results.filter(r => 
    !['哈尔滨','齐齐哈尔','牡丹江','大庆','佳木斯','吉林白城','吉林吉林','辽宁丹东','辽宁锦州'].includes(r.city)
  );

  // 3. 渲染
  let html = '';

  // 等效位次信息
  html += `<div class="card"><div class="card-title">2025年等效参考</div>`;
  html += `<div class="equivalent-box">
    你输入的 2026年 <strong>${score}分</strong> / 位次 <strong>${rank.toLocaleString()}名</strong><br>
    → 参考 2025年：约 <strong>${equivalentScore}分</strong> 上下，位次范围 <strong>${range.lowRank.toLocaleString()} ~ ${range.highRank.toLocaleString()}名</strong><br>
    <span style="font-size:12px;color:#7f8c8d;">（上下各浮动约3%，实际以2026年一分一段表为准）</span>
  </div></div>`;

  // 省内推荐
  html += renderTable('黑龙江省内院校推荐', '（哈尔滨 / 齐齐哈尔 / 牡丹江 / 大庆 / 佳木斯）', domestic, rank, major);

  // 吉林辽宁
  if (jilinLiaoning.length > 0) {
    html += renderTable('吉林 / 辽宁优先院校', '', jilinLiaoning, rank, major);
  }

  // 全国范围
  if (national.length > 0) {
    html += renderTable('全国范围公办院校推荐', '（河北 / 山西 / 内蒙古 / 河南 / 山东 / 安徽 / 江西 / 湖南 / 重庆 / 云南 / 甘肃 / 新疆）', national, rank, major);
  }

  document.getElementById('resultArea').innerHTML = html ||
    `<div class="card"><div class="empty-state"><div class="icon">📋</div>暂无匹配结果，请调整位次或专业后重试</div></div>`;
}

function renderTable(title, subtitle, data, userRank, targetMajor) {
  if (data.length === 0) return '';
  let html = `<div class="card"><div class="card-title">${title}</div>`;
  if (subtitle) html += `<p style="font-size:12px;color:#94a3b8;margin-bottom:12px;">${subtitle}</p>`;
  html += `<table><thead><tr>
    <th>策略</th><th>院校</th><th>城市</th><th>2026组</th><th>主要专业</th>
    <th>2025参考分</th><th>2025参考位次</th><th>位次差</th><th>学费</th><th>备注</th>
  </tr></thead><tbody>`;

  data.forEach(u => {
    // gap = 学校位次 - 你的位次; gap>0=你优于学校, gap<0=你差于学校
    const gapTxt = u.gap >= 0 ? `低 ${u.gap.toLocaleString()} 名` : `高 ${Math.abs(u.gap).toLocaleString()} 名`;
    const gapCls = u.gap >= 0 ? 'gap-pos' : 'gap-neg';
    const badgeCls = u.tier === '冲' ? 'badge-chong' : u.tier === '稳' ? 'badge-wen' : 'badge-bao';
    const matchHighlight = u.matchScore >= 3 ? 'background:#fff9c4;' : '';

    html += `<tr style="${matchHighlight}">
      <td><span class="badge ${badgeCls}">${u.tier}</span></td>
      <td><strong>${u.name}</strong></td>
      <td><span class="city-tag">${u.city}</span></td>
      <td>${u.group}</td>
      <td>${u.majors}</td>
      <td class="num-highlight">${u.score2025}分</td>
      <td>${u.rank2025.toLocaleString()}名</td>
      <td class="${gapCls}">${gapTxt}</td>
      <td>${u.fee}</td>
      <td style="font-size:11px;color:#7f8c8d;">${u.note}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

function resetForm() {
  document.getElementById('score').value = '';
  document.getElementById('rank').value = '';
  document.getElementById('major').value = '';
  document.getElementById('resultArea').innerHTML = '';
}

// Auto-analyze on load
window.addEventListener('DOMContentLoaded', () => {
  analyze();
});
